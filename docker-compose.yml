services:
  install:
    image: node:24-bookworm-slim
    working_dir: /app
    command: >
      sh -c "corepack enable &&
      corepack prepare pnpm@10.33.2 --activate &&
      pnpm install"
    volumes:
      - .:/app
      - pnpm-store:/root/.local/share/pnpm/store

  backend:
    image: node:24-bookworm-slim
    working_dir: /app
    command: >
      sh -c "corepack enable &&
      corepack prepare pnpm@10.33.2 --activate &&
      pnpm --filter @book-manager/backend dev"
    environment:
      BACKEND_PORT: ${BACKEND_PORT:-3001}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:3000}
      DATABASE_PATH: /data/book-manager.sqlite
    ports:
      - "${BACKEND_PORT:-3001}:3001"
    volumes:
      - .:/app
      - ./data:/data
      - pnpm-store:/root/.local/share/pnpm/store
    depends_on:
      install:
        condition: service_completed_successfully

  frontend:
    image: node:24-bookworm-slim
    working_dir: /app
    command: >
      sh -c "corepack enable &&
      corepack prepare pnpm@10.33.2 --activate &&
      pnpm --filter @book-manager/frontend dev --host 0.0.0.0"
    environment:
      FRONTEND_PORT: ${FRONTEND_PORT:-3000}
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:3001}
      VITE_DEV_PROXY_TARGET: http://backend:3001
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    volumes:
      - .:/app
      - pnpm-store:/root/.local/share/pnpm/store
    depends_on:
      install:
        condition: service_completed_successfully
      backend:
        condition: service_started

volumes:
  pnpm-store:
